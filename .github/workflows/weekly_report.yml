name: Weekly Social Arbitrage Report

on:
  workflow_dispatch:
  schedule:
    - cron: "0 1 * * 1"

jobs:
  send-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Copy sample config when missing
        run: |
          if [ ! -f config/watchlist.json ]; then
            cp config/watchlist.example.json config/watchlist.json
          fi

      - name: Run weekly report
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
        run: python main.py --send-telegram
